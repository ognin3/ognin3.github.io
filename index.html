*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }

@property --bg   { syntax: '<color>'; inherits: true; initial-value: #080808; }
@property --text { syntax: '<color>'; inherits: true; initial-value: #b4b4b4; }
@property --mid  { syntax: '<color>'; inherits: true; initial-value: #404040; }
@property --line { syntax: '<color>'; inherits: true; initial-value: #181818; }

:root {
  --bg: #080808;
  --text: #b4b4b4;
  --mid: #404040;
  --line: #181818;
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Fragment Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  transition: --bg 400ms ease, --text 400ms ease, --mid 400ms ease, --line 400ms ease;

.page {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  min-height: 100vh;
}

.col {
  padding: 24px;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;

}
.col::-webkit-scrollbar { display: none; }
.col::after { content: ''; display: block; height: 24px; }
#col-thoughts::after, #col-images::after { height: 0; }
.col + .col { border-left: 1px solid var(--line); }
.col-1 { overflow: hidden; }

.col-loader { color: var(--mid); padding-top: 2px; }
.col-loader-cursor { animation: blink 1.2s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

@media (max-width: 768px) {
  .page { grid-template-columns: 1fr; }
  .col  { height: auto; overflow-y: visible; }

<script>
let _summerCycle = 0;
let _nightCycle  = 0;

let chaosActive = false, chaosLock = false;
let _chaosRaf = null, _chaosState = null, _chaosEngine = null;

function activateChaos() {
  if (chaosLock) return;
  if (chaosActive) { _reverseChaos(); return; }
  if (window.Matter) { _doActivateChaos(); return; }
  chaosLock = true;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js';
  s.onload = () => { chaosLock = false; _doActivateChaos(); };
  document.head.appendChild(s);
}

function _doActivateChaos() {
  if (chaosLock || chaosActive) return;
  chaosLock = true;
  const { Engine, Bodies, Body, World } = Matter;
  const vw = window.innerWidth, vh = window.innerHeight;

  function fullyVisible(r) {
    return r.width > 0 && r.height > 0 && r.top >= 1 && r.bottom <= vh - 1 && r.left >= 1 && r.right <= vw - 1;
  }
  function notHidden(el) {
    const cs = getComputedStyle(el);
    return cs.display !== 'none' && cs.visibility !== 'hidden';
  }

  const toRestore = [];
  const candidates = [];

  function walkText(node) {
    if (node.nodeType === 3) {
      const t = node.textContent;
      if (!t.trim()) return;
      const frag = document.createDocumentFragment();
      t.split(/(\s+)/).forEach(p => {
        if (!p) return;
        if (/^\s+$/.test(p)) { frag.appendChild(document.createTextNode(p)); return; }
        const s = document.createElement('span');
        s.className = '_cw'; s.style.display = 'inline-block'; s.textContent = p;
        frag.appendChild(s);
      });
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === 1 && !['IMG','VIDEO','SVG','CANVAS','BUTTON','INPUT'].includes(node.tagName)) {
      Array.from(node.childNodes).forEach(walkText);
    }
  }

  function splitContainer(el) {
    const html = el.innerHTML, vis = el.style.visibility;
    toRestore.push({ el, html, vis });
    Array.from(el.childNodes).forEach(walkText);
    el.querySelectorAll('._cw').forEach(span => {
      const r = span.getBoundingClientRect();
      if (fullyVisible(r)) candidates.push({ el: span, r, type: 'word' });
    });
    el.style.visibility = 'hidden';
  }

  function addBlock(el) {
    const r = el.getBoundingClientRect();
    if (fullyVisible(r) && notHidden(el)) candidates.push({ el, r, type: 'block' });
  }

  document.querySelectorAll('#col-thoughts .entry').forEach(entry => {
    const r = entry.getBoundingClientRect();
    if (r.width < 1 || r.height < 1 || r.bottom < 0 || r.top > vh) return;
    splitContainer(entry);
    entry.querySelectorAll('.video-btn, .video-wrap').forEach(addBlock);
  });

  document.querySelectorAll('.col-1 > *').forEach(child => {
    const r = child.getBoundingClientRect();
    if (r.width < 1 || r.height < 1) return;
    if (child.classList.contains('logo')) {
      if (fullyVisible(r)) candidates.push({ el: child, r, type: 'block' });
    } else {
      splitContainer(child);
    }
  });

  document.querySelectorAll('#col-images .entry').forEach(entry => {
    const r = entry.getBoundingClientRect();
    if (r.width < 1 || r.height < 1 || r.bottom < 0 || r.top > vh) return;
    toRestore.push({ el: entry, html: null, vis: entry.style.visibility });
    entry.style.visibility = 'hidden';
    const gallery = entry.querySelector('.gallery-wrap');
    if (gallery) {
      const activeImgWrap = gallery.querySelector('.gallery-slide.active .img-wrap');
      if (activeImgWrap) addBlock(activeImgWrap);
      const cap = gallery.querySelector('.gallery-caption');
      if (cap && cap.textContent.trim()) splitContainer(cap);
      gallery.querySelectorAll('.gallery-btn, .gallery-counter').forEach(addBlock);
    } else {
      const imgWrap = entry.querySelector('.img-wrap');
      const directMedia = entry.querySelector('img.entry-img, video.entry-img');
      if (imgWrap) addBlock(imgWrap);
      else if (directMedia) addBlock(directMedia);
      const cap = entry.querySelector('.entry-caption');
      if (cap && cap.textContent.trim()) splitContainer(cap);
    }
  });

  const savedBorders = [];
  document.querySelectorAll('.col + .col').forEach(col => {
    const cs = getComputedStyle(col);
    const blw = parseFloat(cs.borderLeftWidth) || 0;
    const btw = parseFloat(cs.borderTopWidth) || 0;
    const cr = col.getBoundingClientRect();
    if (blw >= 1) {
      savedBorders.push({ el: col, prop: 'borderLeft', val: col.style.borderLeft });
      col.style.borderLeft = 'none';
      const sep = document.createElement('div');
      sep.style.cssText = `position:fixed;left:${cr.left - blw}px;top:0;width:${blw}px;height:${vh}px;background:var(--line);pointer-events:none;z-index:1`;
      document.body.appendChild(sep);
      candidates.push({ el: sep, isTempEl: true, type: 'separator', r: { left: cr.left - blw, top: 0, right: cr.left, bottom: vh, width: blw, height: vh } });
    } else if (btw >= 1) {
      savedBorders.push({ el: col, prop: 'borderTop', val: col.style.borderTop });
      col.style.borderTop = 'none';
      const sep = document.createElement('div');
      sep.style.cssText = `position:fixed;left:0;top:${cr.top - btw}px;width:${vw}px;height:${btw}px;background:var(--line);pointer-events:none;z-index:1`;
      document.body.appendChild(sep);
      candidates.push({ el: sep, isTempEl: true, type: 'separator', r: { left: 0, top: cr.top - btw, right: vw, bottom: cr.top, width: vw, height: btw } });
    }
  });

  const engine = Engine.create({ gravity: { y: 3.5 }, enableSleeping: true });
  const world = engine.world;
  const WW = 100;
  World.add(world, [
    Bodies.rectangle(vw/2, vh + WW/2, vw + 400, WW, { isStatic: true, friction: 0.9, restitution: 0.04 }),
    Bodies.rectangle(-WW/2, vh/2, WW, vh * 4, { isStatic: true }),
    Bodies.rectangle(vw + WW/2, vh/2, WW, vh * 4, { isStatic: true }),
  ]);

  const overlayRoot = document.createElement('div');
  overlayRoot.style.cssText = 'position:fixed;inset:0;z-index:9001;pointer-events:none;overflow:visible;user-select:none';
  document.body.appendChild(overlayRoot);

  const items = [];
  let dragBody = null, dragLastX = 0, dragLastY = 0, dragVx = 0, dragVy = 0, dragOx = 0, dragOy = 0;

  candidates.forEach(({ el, r, type, isTempEl }) => {
    const w = Math.max(r.width, 2);
    const h = Math.max(r.height, 2);
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;

    const opts = type === 'separator' ? { friction: 0.2, restitution: 0.5, frictionAir: 0.001, density: 0.0003 }
              : type === 'word' ? { friction: 0.5, restitution: 0.1, frictionAir: 0.004 }
              : { friction: 0.7, restitution: 0.06, frictionAir: 0.004 };
    const body = Bodies.rectangle(cx, cy, w, h, opts);
    World.add(world, body);

    const ov = document.createElement('div');
    ov.style.cssText = `position:absolute;left:0;top:0;width:${w}px;height:${h}px;pointer-events:auto;cursor:grab;will-change:transform;transform:translate(${cx - w/2}px,${cy - h/2}px)`;

    if (type === 'word') {
      const cs = getComputedStyle(el);
      Object.assign(ov.style, {
        fontFamily: cs.fontFamily, fontSize: cs.fontSize, fontWeight: cs.fontWeight,
        color: cs.color, letterSpacing: cs.letterSpacing, lineHeight: cs.lineHeight,
        whiteSpace: 'nowrap', display: 'flex', alignItems: 'center',
      });
      ov.textContent = el.textContent;
    } else if (type === 'separator') {
      ov.style.background = 'var(--line)';
    } else {
      const clone = el.cloneNode(true);
      const pos = getComputedStyle(el).position;
      if (pos === 'fixed' || pos === 'sticky') clone.style.position = 'static';
      clone.style.width = w + 'px';
      clone.style.height = h + 'px';
      clone.style.overflow = 'hidden';
      ov.appendChild(clone);
    }

    overlayRoot.appendChild(ov);
    const origVis = el.style.visibility;
    el.style.visibility = 'hidden';
    items.push({ body, ov, el, type, isTempEl: !!isTempEl, origVis, origCx: cx, origCy: cy, w, h });
  });

  const logoItem = items.find(i => i.el.classList?.contains('logo'));
  if (logoItem) {
    logoItem.ov.style.cursor = 'pointer';
    logoItem.ov.addEventListener('click', () => activateChaos());
    logoItem.ov.addEventListener('touchend', e => { e.preventDefault(); activateChaos(); }, { passive: false });
  }

  function onPointerMove(px, py) {
    if (!dragBody) return;
    const dx = px - dragOx;
    const dy = py - dragOy;
    dragVx = px - dragLastX;
    dragVy = py - dragLastY;
    dragLastX = px;
    dragLastY = py;
    Body.setPosition(dragBody, { x: px - dragOx, y: py - dragOy });
  }

  overlayRoot.addEventListener('mousedown', e => {
    const item = items.find(i => i.ov === e.target || i.ov.contains(e.target));
    if (!item) return;
    e.preventDefault();
    dragBody = item.body;
    Matter.Sleeping.set(dragBody, false);
    const r = item.ov.getBoundingClientRect();
    dragOx = e.clientX - r.left;
    dragOy = e.clientY - r.top;
    dragLastX = e.clientX;
    dragLastY = e.clientY;
    dragVx = 0; dragVy = 0;
    item.ov.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
  document.addEventListener('mouseup', () => {
    if (dragBody) {
      Body.setVelocity(dragBody, { x: dragVx * 4, y: dragVy * 4 });
      const item = items.find(i => i.body === dragBody);
      if (item) item.ov.style.cursor = 'grab';
      dragBody = null;
    }
  });

  overlayRoot.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    const item = items.find(i => i.ov === document.elementFromPoint(t.clientX, t.clientY) || i.ov.contains(document.elementFromPoint(t.clientX, t.clientY)));
    if (!item) return;
    dragBody = item.body;
    Matter.Sleeping.set(dragBody, false);
    const r = item.ov.getBoundingClientRect();
    dragOx = t.clientX - r.left;
    dragOy = t.clientY - r.top;
    dragLastX = t.clientX;
    dragLastY = t.clientY;
    dragVx = 0; dragVy = 0;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!dragBody) return;
    const t = e.changedTouches[0];
    onPointerMove(t.clientX, t.clientY);
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (dragBody) {
      Body.setVelocity(dragBody, { x: dragVx * 4, y: dragVy * 4 });
      dragBody = null;
    }
  });

  document.body.style.overflow = 'hidden';

  _chaosState = { items, toRestore, savedBorders, overlayRoot, engine };
  _chaosEngine = engine;

  function tick() {
    Engine.update(engine, 1000 / 60);
    items.forEach(({ body, ov }) => {
      ov.style.transform = `translate(${body.position.x - parseFloat(ov.style.width)/2}px,${body.position.y - parseFloat(ov.style.height)/2}px) rotate(${body.angle}rad)`;
    });
    _chaosRaf = requestAnimationFrame(tick);
  }
  _chaosRaf = requestAnimationFrame(tick);

  chaosActive = true;
  chaosLock = false;
}

function _reverseChaos() {
  if (!chaosActive || !_chaosState) return;
  chaosActive = false;
  chaosLock = true;
  cancelAnimationFrame(_chaosRaf);

  const { items, toRestore, savedBorders, overlayRoot, engine } = _chaosState;
  const duration = 750;
  const start = performance.now();

  const snapshots = items.map(({ body, ov, origCx, origCy, w, h }) => ({
    ov, origCx, origCy, w, h,
    startX: body.position.x, startY: body.position.y, startA: body.angle
  }));

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function anim(now) {
    const t = Math.min(1, (now - start) / duration);
    const e = easeInOut(t);
    snapshots.forEach(({ ov, origCx, origCy, w, h, startX, startY, startA }) => {
      const x = startX + (origCx - startX) * e;
      const y = startY + (origCy - startY) * e;
      const a = startA * (1 - e);
      ov.style.transform = `translate(${x - w / 2}px,${y - h / 2}px) rotate(${a}rad)`;
    });
    if (t < 1) {
      requestAnimationFrame(anim);
    } else {
      toRestore.forEach(({ el, html, vis }) => {
        if (html !== null) el.innerHTML = html;
        el.style.visibility = vis;
      });
      items.forEach(({ el, origVis, isTempEl }) => {
        el.style.visibility = origVis;
        if (isTempEl) el.remove();
      });
      savedBorders.forEach(({ el, prop, val }) => {
        el.style[prop] = val;
      });
      document.body.style.overflow = '';
      overlayRoot.remove();
      Matter.Engine.clear(engine);
      _chaosState = null;
      _chaosEngine = null;
      chaosLock = false;
    }
  }
  requestAnimationFrame(anim);
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(ts) {
  const d = new Date(ts);
  const date = d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' });
  const time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return `${date} · ${time}`;
}

function initVideo(entry) {
  const video = entry.querySelector('video');
  const overlay = entry.querySelector('.shader-overlay');
  const btnPlay = entry.querySelector('.btn-play');
  const btnMute = entry.querySelector('.btn-mute');
  if (!video) return;
  btnPlay?.addEventListener('click', () => {
    if (video.paused) video.play().catch(() => {});
    else video.pause();
  });
  btnMute?.addEventListener('click', () => {
    video.muted = !video.muted;
    btnMute.textContent = video.muted ? 'COM SOM' : 'MUDO';
  });
  video.addEventListener('play', () => {
    if (btnPlay) btnPlay.textContent = 'PAUSA';
    if (overlay) overlay.style.opacity = '0';
  });
  video.addEventListener('pause', () => {
    if (btnPlay) btnPlay.textContent = 'TOCAR';
    if (overlay) overlay.style.opacity = '1';
  });
}

function initGallery(wrap) {
  const slides = Array.from(wrap.querySelectorAll('.gallery-slides .gallery-slide'));
  const counter = wrap.querySelector('.gallery-counter');
  const btnPrev = wrap.querySelector('.btn-prev');
  const btnNext = wrap.querySelector('.btn-next');
  const total = slides.length;
  if (total <= 1) return;
  let idx = 0;
  let navTimer = null;
  if (btnPrev) btnPrev.style.visibility = 'visible';

  function goTo(n, dir) {
    const nextIdx = (n + total) % total;
    if (nextIdx === idx) return;
    const prev = slides[idx];
    idx = nextIdx;
    const next = slides[idx];
    wrap.classList.add('gallery-navigating');
    clearTimeout(navTimer);
    navTimer = setTimeout(() => wrap.classList.remove('gallery-navigating'), 300);
    const enterClass = dir === 'prev' ? 'entering-prev' : 'entering-next';
    const leaveClass = dir === 'prev' ? 'leaving-prev' : 'leaving-next';
    prev.classList.remove('active');
    prev.classList.add('leaving', leaveClass);
    setTimeout(() => prev.classList.remove('leaving', leaveClass), 300);
    next.classList.add('active', enterClass);
    setTimeout(() => next.classList.remove(enterClass), 300);
    if (counter) counter.textContent = `${idx + 1}/${total}`;
    const imgWrap = next.querySelector('.img-wrap');
    if (imgWrap && window._initShader) window._initShader(imgWrap);
  }

  btnPrev?.addEventListener('click', () => goTo(idx - 1, 'prev'));
  btnNext?.addEventListener('click', () => goTo(idx + 1, 'next'));

  let touchX = 0, touchT = 0;
  wrap.addEventListener('touchstart', e => {
    touchX = e.changedTouches[0].clientX;
    touchT = Date.now();
    wrap.classList.add('gallery-pressing');
  }, { passive: true });
  const endPress = e => {
    wrap.classList.remove('gallery-pressing');
    if (!e) return;
    const dx = e.changedTouches[0].clientX - touchX;
    const velocity = Math.abs(dx) / (Date.now() - touchT);
    if (Math.abs(dx) > 40 || velocity > 0.3) {
      if (dx < 0) goTo(idx + 1, 'next');
      else goTo(idx - 1, 'prev');
    }
  };
  wrap.addEventListener('touchend', endPress, { passive: true });
  wrap.addEventListener('touchcancel', endPress, { passive: true });
}

function setupReveal(col) {
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const entries = Array.from(col.querySelectorAll('.entry'));
  if (!entries.length) return;
  if (reducedMotion) { entries.forEach(el => el.classList.add('visible')); return; }
  let staggerCount = 0;
  const io = new IntersectionObserver((recs) => {
    recs.filter(r => r.isIntersecting)
      .sort((a, b) => (a.target.compareDocumentPosition(b.target) & 4) ? -1 : 1)
      .forEach(rec => {
        const el = rec.target;
        const delay = Math.min(staggerCount * 50, 400);
        staggerCount++;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.transitionDelay = `${delay}ms`;
          el.classList.add('visible');
        }));
        io.unobserve(el);
      });
  }, { threshold: 0.05, rootMargin: '0px 0px -10px 0px' });
  entries.forEach(el => io.observe(el));
}

function renderCol2(items) {
  const col = document.getElementById('col-thoughts');
  col.querySelector('.col-loader')?.remove();
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'entry';
    let html = '';
    if (item.type === 'video' || item.type === 'video_note') {
      const isCircle = item.type === 'video_note';
      html = `<div class="video-entry"><div class="video-wrap${isCircle ? ' video-wrap--circle' : ''}"><video src="${escapeHtml(item.url)}" muted playsinline preload="none" crossorigin="anonymous"></video><div class="shader-overlay"></div></div><div class="video-controls"><button class="video-btn btn-play">TOCAR</button><button class="video-btn btn-mute">COM SOM</button></div></div>`;
    } else {
      html = `<div class="entry-text">${item.html || escapeHtml(item.text || '')}</div>`;
    }
    const caption = item.captionHtml || (item.caption ? escapeHtml(item.caption) : null);
    if (caption) html += `<div class="entry-caption">${caption}</div>`;
    html += `<div class="entry-time">${formatDate(item.ts)}</div>`;
    el.innerHTML = html;
    col.appendChild(el);
    const videoEntry = el.querySelector('.video-entry');
    if (videoEntry) initVideo(videoEntry);
  });
}

function renderImages(images) {
  const col = document.getElementById('col-images');
  col.querySelector('.col-loader')?.remove();
  const iframes = images.filter(img => img.type === 'iframe');
  const others = images.filter(img => img.type !== 'iframe');

  if (iframes.length) {
    const el = document.createElement('div');
    el.className = 'entry';
    const cards = iframes.map(img =>
      `<div class="iframe-card"><iframe src="${escapeHtml(img.url)}" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>${img.captionHtml ? `<div class="entry-caption">${img.captionHtml}</div>` : ''}</div>`
    ).join('');
    el.innerHTML = `<div class="iframe-grid">${cards}</div>`;
    col.appendChild(el);
  }

  others.forEach(img => {
    const el = document.createElement('div');
    el.className = 'entry';
    let html = '';
    if (img.type === 'gallery' && img.images?.length) {
      const total = img.images.length;
      const slides = img.images.map((im, i) =>
        `<div class="gallery-slide${i === 0 ? ' active' : ''}"><div class="img-wrap"><img src="${escapeHtml(im.url)}" class="entry-img" alt=""><div class="shader-overlay"></div></div></div>`
      ).join('');
      const caption = img.captionHtml || '';
      html = `<div class="gallery-wrap"><div class="gallery-slides">${slides}</div><div class="gallery-footer"><span class="gallery-caption">${caption}</span><div class="gallery-nav"><button class="gallery-btn btn-prev" style="visibility:hidden">◀</button><span class="gallery-counter">1/${total}</span><button class="gallery-btn btn-next"${total <= 1 ? ' style="visibility:hidden"' : ''}>▶</button></div></div></div>`;
    } else if (img.type === 'gif') {
      html = img.url.endsWith('.gif')
        ? `<img src="${escapeHtml(img.url)}" class="entry-img" alt="">`
        : `<video src="${escapeHtml(img.url)}" autoplay loop muted playsinline class="entry-img" style="display:block;width:100%;height:auto;"></video>`;
    } else {
      html = `<div class="img-wrap"><img src="${escapeHtml(img.url)}" class="entry-img" loading="lazy" alt=""><div class="shader-overlay"></div></div>`;
    }
    if (img.type !== 'gallery') {
      html += img.captionHtml ? `<div class="entry-caption">${img.captionHtml}</div>` : '';
    }
    html += `<div class="entry-time">${formatDate(img.ts)}</div>`;
    el.innerHTML = html;
    col.appendChild(el);
    const galleryWrap = el.querySelector('.gallery-wrap');
    if (galleryWrap) initGallery(galleryWrap);
  });
}

(function() {
  const desktop = () => window.matchMedia('(min-width: 769px)').matches;
  const col2 = document.getElementById('col-thoughts');
  const col3 = document.getElementById('col-images');
  let hovered = null;
  col2.addEventListener('mouseenter', () => hovered = col2);
  col2.addEventListener('mouseleave', () => hovered = null);
  col3.addEventListener('mouseenter', () => hovered = col3);
  col3.addEventListener('mouseleave', () => hovered = null);

  document.addEventListener('wheel', function(e) {
    if (!desktop()) return;
    e.preventDefault();
    let dy = e.deltaY;
    if (e.deltaMode === 1) dy *= 24;
    if (e.deltaMode === 2) dy *= window.innerHeight;

    if (hovered === col2 || hovered === col3) {
      hovered.scrollTop += dy;
    } else {
      if (dy > 0) {
        const col2left = col2.scrollHeight - col2.scrollTop - col2.clientHeight;
        if (col2left > 1) col2.scrollTop += dy;
        else              col3.scrollTop += dy;
      } else {
        if (col3.scrollTop > 0) col3.scrollTop += dy;
        else                    col2.scrollTop += dy;
      }
    }
  }, { passive: false });
})();

(function() {
  const col3 = document.getElementById('col-images');
  let pressed = null;
  col3.addEventListener('touchstart', e => {
    const wrap = e.target.closest('.img-wrap');
    if (wrap && !wrap.closest('.gallery-slide')) {
      pressed = wrap;
      wrap.classList.add('img-pressing');
    }
  }, { passive: true });
  const release = () => {
    if (pressed) { pressed.classList.remove('img-pressing'); pressed = null; }
  };
  col3.addEventListener('touchend', release, { passive: true });
  col3.addEventListener('touchcancel', release, { passive: true });
})();

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const v  = document.getElementById('leaves-overlay');
  const a  = document.getElementById('forest-audio');
  const mv = document.getElementById('moon-overlay');
  const ma = document.getElementById('night-audio');
  const rv = document.getElementById('rain-overlay');
  const ra = document.getElementById('rain-audio');
  const stopSummer   = () => { v.pause();  a.pause();  a.currentTime = 0; };
  const stopMidnight = () => { mv.pause(); ma.pause(); ma.currentTime = 0; document.body.classList.remove('midnight'); };
  const stopRain     = () => { rv.pause(); ra.pause(); ra.currentTime = 0; document.body.classList.remove('rain'); };

  if (e.key === 'd' || e.key === 'D') {
    document.body.classList.add('light');
    document.body.classList.remove('leaves');
    stopSummer(); stopMidnight(); stopRain();
  }
  if (e.key === 'n' || e.key === 'N') {
    document.body.classList.remove('light', 'leaves');
    stopSummer(); stopMidnight(); stopRain();
  }
  if (e.key === 's' || e.key === 'S') {
    if (!document.body.classList.contains('leaves')) {
      document.body.classList.add('light', 'leaves');
      stopMidnight(); stopRain();
      v.play().catch(() => {}); a.play().catch(() => {});
    }
  }
  if (e.key === 'm' || e.key === 'M') {
    if (!document.body.classList.contains('midnight')) {
      document.body.classList.remove('light', 'leaves');
      stopSummer(); stopRain();
      document.body.classList.add('midnight');
      mv.play().catch(() => {}); ma.play().catch(() => {});
    }
  }
  if (e.key === 'r' || e.key === 'R') {
    if (!document.body.classList.contains('rain')) {
      document.body.classList.remove('light', 'leaves');
      stopSummer(); stopMidnight();
      document.body.classList.add('light', 'rain');
      rv.play().catch(() => {}); ra.play().catch(() => {});
    }
  }
  if (e.key === 'c' || e.key === 'C') {
    activateChaos();
  }
});

document.querySelectorAll('.logo-letter[data-mode]').forEach(el => {
  el.addEventListener('touchend', e => {
    e.preventDefault();
    const v  = document.getElementById('leaves-overlay');
    const a  = document.getElementById('forest-audio');
    const mv = document.getElementById('moon-overlay');
    const ma = document.getElementById('night-audio');
    const rv = document.getElementById('rain-overlay');
    const ra = document.getElementById('rain-audio');
    const stopSummer   = () => { v.pause();  a.pause();  a.currentTime = 0; };
    const stopMidnight = () => { mv.pause(); ma.pause(); ma.currentTime = 0; document.body.classList.remove('midnight'); };
    const stopRain     = () => { rv.pause(); ra.pause(); ra.currentTime = 0; document.body.classList.remove('rain'); };
    const mode = el.dataset.mode;
    if (mode === 'day') {
      document.body.classList.add('light');
      document.body.classList.remove('leaves');
      stopSummer(); stopMidnight(); stopRain();
      _summerCycle = 0; _nightCycle = 0;
    } else if (mode === 'night') {
      stopSummer(); stopRain();
      if (_nightCycle === 0) {
        document.body.classList.remove('light', 'leaves');
        stopMidnight();
        _nightCycle = 1;
      } else {
        document.body.classList.remove('light', 'leaves');
        stopMidnight();
        document.body.classList.add('midnight');
        mv.play().catch(() => {}); ma.play().catch(() => {});
        _nightCycle = 0;
      }
    } else if (mode === 'summer') {
      stopMidnight();
      if (_summerCycle === 0) {
        stopRain();
        document.body.classList.add('light', 'leaves');
        v.play().catch(() => {}); a.play().catch(() => {});
        _summerCycle = 1;
      } else {
        stopSummer();
        document.body.classList.remove('leaves');
        document.body.classList.add('light', 'rain');
        rv.play().catch(() => {}); ra.play().catch(() => {});
        _summerCycle = 0;
      }
    } else if (mode === 'chaos') {
      activateChaos();
    }
  }, { passive: false });
});

function loadData(data) {
  const col2Media = data.images?.filter(i => ['video', 'video_note'].includes(i.type)) || [];
  const col3Media = data.images?.filter(i => !i.type || ['image', 'gallery', 'gif', 'iframe'].includes(i.type)) || [];
  const col2Items = [...(data.thoughts || []), ...col2Media].sort((a, b) => {
    if (a.featured && !b.featured) return -1;
    if (!a.featured && b.featured) return 1;
    if (a.featured && b.featured) return (b.featured_ts || 0) - (a.featured_ts || 0);
    return b.ts - a.ts;
  });
  renderCol2(col2Items);
  renderImages(col3Media);
  setupReveal(document.getElementById('col-thoughts'));
  setupReveal(document.getElementById('col-images'));
}

try {
  loadData(JSON.parse(document.getElementById('content-data').textContent));
} catch(e) {
  ['col-thoughts', 'col-images'].forEach(id => {
    const col = document.getElementById(id);
    col.querySelector('.col-loader')?.remove();
    col.innerHTML = '<div class="entry visible">erro ao carregar conteudo</div>';
  });
}

<script type="module">
import React from 'react';
import { createRoot } from 'react-dom/client';
import { HalftoneDots } from '@paper-design/shaders-react';

const SHADER_PROPS = {
  contrast: 0.4, originalColors: false, inverted: false,
  grid: 'hex', radius: 1, size: 0.2, scale: 1,
  grainSize: 0.5, type: 'gooey', fit: 'cover',
  grainMixer: 0.2, grainOverlay: 0.2,
  colorFront: '#2B2B2B', colorBack: '#00000000',
  backgroundColor: '#F2F1E8'
};

const VIDEO_SHADER_PROPS = { ...SHADER_PROPS, backgroundColor: 'transparent' };

function initShader(imgWrap) {
  if (imgWrap._shaderRoot) return;
  const overlay = imgWrap.querySelector('.shader-overlay');
  if (!overlay) return;
  const isVideo = !!imgWrap.closest('.video-wrap');
  const root = createRoot(overlay);
  root.render(React.createElement(HalftoneDots, {
    ...(isVideo ? VIDEO_SHADER_PROPS : SHADER_PROPS),
    style: { width: '100%', height: '100%' }
  }));
  imgWrap._shaderRoot = root;
}

window._initShader = initShader;

function initAllShaders() {
  document.querySelectorAll('#col-images .img-wrap, #col-thoughts .video-wrap').forEach(wrap => {
    initShader(wrap);
  });
}

const shaderIO = new IntersectionObserver((recs) => {
  recs.forEach(rec => {
    const wrap = rec.target;
    if (rec.isIntersecting) {
      if (!wrap._shaderRoot) initShader(wrap);
    } else {
      if (wrap._shaderRoot) {
        wrap._shaderRoot.unmount();
        delete wrap._shaderRoot;
      }
    }
  });
}, { rootMargin: '150px' });

function observeShaders() {
  ['col-thoughts', 'col-images'].forEach(id => {
    const col = document.getElementById(id);
    if (!col) return;
    const mo = new MutationObserver(() => {
      col.querySelectorAll('.img-wrap, .video-wrap').forEach(wrap => {
        if (!wrap._shaderObserved) {
          wrap._shaderObserved = true;
          shaderIO.observe(wrap);
        }
      });
    });
    mo.observe(col, { childList: true, subtree: true });
  });
}

const waitForContent = setInterval(() => {
  if (document.querySelector('#col-thoughts .entry') || document.querySelector('#col-images .entry')) {
    clearInterval(waitForContent);
    initAllShaders();
    observeShaders();
    document.querySelectorAll('#col-images .img-wrap, #col-thoughts .video-wrap').forEach(wrap => {
      if (!wrap._shaderObserved) {
        wrap._shaderObserved = true;
        shaderIO.observe(wrap);
      }
    });
  }
