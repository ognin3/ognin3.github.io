<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nine</title>
  <link rel="canonical" href="https://nine.works">
  <meta property="og:title" content="nine">
  <meta property="og:description" content="nine">
  <meta property="og:url" content="https://nine.works">
  <meta property="og:image" content="assets/cover.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="nine">
  <meta name="twitter:description" content="nine">
  <meta name="twitter:image" content="assets/cover.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }

@property --bg   { syntax: '<color>'; inherits: true; initial-value: #080808; }
@property --text { syntax: '<color>'; inherits: true; initial-value: #b4b4b4; }
@property --mid  { syntax: '<color>'; inherits: true; initial-value: #404040; }
@property --line { syntax: '<color>'; inherits: true; initial-value: #181818; }

:root {
  --bg: #080808;
  --text: #b4b4b4;
  --mid: #404040;
  --line: #181818;
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Fragment Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  transition: --bg 400ms ease, --text 400ms ease, --mid 400ms ease, --line 400ms ease;
}

.page {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  min-height: 100vh;
}

.col {
  padding: 24px;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  min-width: 0;
}
.col::-webkit-scrollbar { display: none; }
.col::after { content: ''; display: block; height: 24px; }
#col-thoughts::after, #col-images::after { height: 0; }
.col + .col { border-left: 1px solid var(--line); }
.col-1 { overflow: hidden; }

.col-loader { color: var(--mid); padding-top: 2px; }
.col-loader-cursor { animation: blink 1.2s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

@media (max-width: 768px) {
  .page { grid-template-columns: 1fr; }
  .col  { height: auto; overflow-y: visible; }
  .col::after { height: 0; }
  .col + .col { border-left: none; border-top: 1px solid var(--line); }
  .col-1 { overflow: visible; }
  .gallery-footer { align-items: flex-start; }
  .gallery-footer .gallery-nav { padding-top: 4px; }
}

.logo {
  display: block; height: 28px; width: auto;
  filter: invert(1); margin-bottom: 32px;
}
p { margin-bottom: 32px; }
.section { margin-bottom: 28px; }
.section-title {
  font-size: 10px; font-weight: 500; color: var(--mid);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px;
}
.links { display: flex; flex-direction: column; gap: 4px; }
a {
  color: var(--text); text-decoration: underline;
  text-underline-offset: 3px; text-decoration-color: #303030;
}
a:hover { color: #e0e0e0; text-decoration-color: #606060; }
.social-fixed { position: fixed; bottom: 24px; left: 24px; }
@media (max-width: 768px) {
  .social-fixed { position: static; margin-top: 28px; }
}
@keyframes colFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.col-1 > :nth-child(1) { animation: colFadeIn 560ms var(--ease-out)  80ms both; }
.col-1 > :nth-child(2) { animation: colFadeIn 560ms var(--ease-out) 160ms both; }
.col-1 > :nth-child(3) { animation: colFadeIn 560ms var(--ease-out) 240ms both; }
.col-1 > :nth-child(4) { animation: colFadeIn 560ms var(--ease-out) 320ms both; }
@media (prefers-reduced-motion: reduce) {
  .col-1 > :nth-child(n) { animation: none; }
}
  </style>
</head>
<body>
  <div class="page">
    <div class="col col-1">
      <img src="assets/logo.svg" class="logo" alt="nine">

      <p>transformando ideias em experiencias digitais — construindo <a href="#">sites</a> que importam.</p>

      <div class="section">
        <div class="section-title">Artefatos</div>
        <div class="links">
          <a href="./artifacts/tetris/">tetris</a>
          <a href="./artifacts/sudoku/">sudoku</a>
        </div>
      </div>

      <div class="social-fixed">
        <div class="section-title">Social</div>
        <div class="links">
          <a href="#">github.com/nine</a>
        </div>
      </div>
    </div>

    <div class="col" id="col-thoughts">
      <div class="col-loader">carregando<span class="col-loader-cursor">_</span></div>
    </div>

    <div class="col" id="col-images">
      <div class="col-loader">carregando<span class="col-loader-cursor">_</span></div>
    </div>
  </div>
</body>
</html>
