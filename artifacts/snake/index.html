<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cobra — nine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#080808;color:#b4b4b4;font-family:'Fragment Mono',monospace}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
#start,#game,#over{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#start .title{font-size:clamp(32px,8vw,64px);letter-spacing:-0.05em;line-height:1;color:#e0e0e0;margin-bottom:24px}
#start .sub{font-size:13px;color:#606060;text-align:center;line-height:1.8}
#game{display:none}
.hud{display:flex;gap:32px;font-size:13px;color:#888;margin-bottom:12px}
.hud span{color:#e0e0e0}
canvas{border:1px solid #181818;display:block}
.mobile-controls{display:none;margin-top:12px;gap:8px}
.mobile-controls button{background:none;border:1px solid #181818;color:#606060;font-family:'Fragment Mono',monospace;font-size:20px;width:48px;height:48px;cursor:pointer;border-radius:4px;touch-action:manipulation}
.mobile-controls button:active{background:#181818;color:#e0e0e0}
.ctrl-row{display:flex;gap:8px;justify-content:center}
#over{display:none;background:rgba(8,8,8,0.92);z-index:10}
#over .title{font-size:clamp(24px,6vw,48px);color:#e0e0e0;margin-bottom:16px}
#over .score{font-size:13px;color:#888;margin-bottom:12px}
#over .score span{color:#e0e0e0}
#over .hint{font-size:12px;color:#404040}
#pause{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,8,8,0.92);z-index:10}
#pause .title{font-size:24px;color:#e0e0e0;margin-bottom:8px}
#pause .hint{font-size:12px;color:#404040}
@media(max-width:768px){.mobile-controls{display:flex;flex-direction:column;align-items:center}}
@media(hover:hover) and (pointer:fine){.mobile-controls{display:none!important}}
</style>
</head>
<body>

<div id="start">
  <div class="title">COBRA</div>
  <div class="sub">PRESSIONE QUALQUER TECLA<br>OU TOQUE PARA COMECAR<br><br>SETAS MOVER · P PAUSA</div>
</div>

<div id="game">
  <div class="hud">
    <div>PONTOS <span id="score">0</span></div>
    <div>NIVEL <span id="level">1</span></div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="mobile-controls">
    <button id="btn-up">▲</button>
    <div class="ctrl-row">
      <button id="btn-left">◀</button>
      <button id="btn-down">▼</button>
      <button id="btn-right">▶</button>
    </div>
  </div>
</div>

<div id="over">
  <div class="title">FIM DE JOGO</div>
  <div class="score">PONTOS <span id="final-score">0</span></div>
  <div class="hint">PRESSIONE R PARA REINICIAR</div>
</div>

<div id="pause">
  <div class="title">PAUSADO</div>
  <div class="hint">PRESSIONE P PARA CONTINUAR</div>
</div>

<script>
const COLS=20,ROWS=20;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let cellSize,W,H;
let snake,dir,nextDir,food,score,level,speed,interval,state;

function resize(){
  const maxW=Math.min(window.innerWidth-24,600);
  const maxH=Math.min(window.innerHeight-160,600);
  cellSize=Math.floor(Math.min(maxW/COLS,maxH/ROWS));
  W=cellSize*COLS;H=cellSize*ROWS;
  canvas.width=W;canvas.height=H;
}

function init(){
  snake=[{x:5,y:10},{x:4,y:10},{x:3,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;speed=150;
  placeFood();
  document.getElementById('score').textContent=0;
  document.getElementById('level').textContent=1;
}

function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function draw(){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#141414';ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*cellSize,0);ctx.lineTo(x*cellSize,H);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*cellSize);ctx.lineTo(W,y*cellSize);ctx.stroke()}
  ctx.fillStyle='#8aff8a';
  ctx.fillRect(food.x*cellSize+1,food.y*cellSize+1,cellSize-2,cellSize-2);
  snake.forEach((s,i)=>{
    if(i===0){ctx.fillStyle='#e0e0e0'}
    else{ctx.fillStyle='#505050'}
    ctx.fillRect(s.x*cellSize+1,s.y*cellSize+1,cellSize-2,cellSize-2);
  });
}

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    clearInterval(interval);state='over';
    document.getElementById('final-score').textContent=score;
    document.getElementById('over').style.display='flex';
    return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;
    document.getElementById('score').textContent=score;
    const newLevel=Math.floor(score/50)+1;
    if(newLevel!==level){
      level=newLevel;speed=Math.max(50,150-(level-1)*12);
      document.getElementById('level').textContent=level;
      clearInterval(interval);interval=setInterval(step,speed);
    }
    placeFood();
  }else{snake.pop()}
  draw();
}

function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('over').style.display='none';
  document.getElementById('pause').style.display='none';
  init();draw();
  state='play';interval=setInterval(step,speed);
}

function setDir(x,y){
  if(dir.x===-x&&dir.y===-y)return;
  nextDir={x,y};
}

document.addEventListener('keydown',e=>{
  if(state==='start'){startGame();return}
  if(state==='over'&&e.key==='r'){startGame();return}
  if(e.key==='p'||e.key==='P'){
    if(state==='play'){clearInterval(interval);state='pause';document.getElementById('pause').style.display='flex'}
    else if(state==='pause'){state='play';interval=setInterval(step,speed);document.getElementById('pause').style.display='none'}
    return;
  }
  if(state!=='play')return;
  if(e.key==='ArrowUp'){e.preventDefault();setDir(0,-1)}
  else if(e.key==='ArrowDown'){e.preventDefault();setDir(0,1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();setDir(-1,0)}
  else if(e.key==='ArrowRight'){e.preventDefault();setDir(1,0)}
});

document.getElementById('btn-up').addEventListener('touchstart',e=>{e.preventDefault();if(state==='start')startGame();else if(state==='play')setDir(0,-1)},{passive:false});
document.getElementById('btn-down').addEventListener('touchstart',e=>{e.preventDefault();if(state==='start')startGame();else if(state==='play')setDir(0,1)},{passive:false});
document.getElementById('btn-left').addEventListener('touchstart',e=>{e.preventDefault();if(state==='start')startGame();else if(state==='play')setDir(-1,0)},{passive:false});
document.getElementById('btn-right').addEventListener('touchstart',e=>{e.preventDefault();if(state==='start')startGame();else if(state==='play')setDir(1,0)},{passive:false});

document.getElementById('start').addEventListener('touchstart',()=>{if(state==='start')startGame()},{passive:true});

let touchX=0,touchY=0;
document.addEventListener('touchstart',e=>{touchX=e.changedTouches[0].clientX;touchY=e.changedTouches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  if(state!=='play')return;
  const dx=e.changedTouches[0].clientX-touchX;
  const dy=e.changedTouches[0].clientY-touchY;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0)}else{setDir(0,dy>0?1:-1)}
},{passive:true});

state='start';
resize();
window.addEventListener('resize',resize);
</script>
</body>
</html>
